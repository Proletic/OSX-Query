name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Makefile'
      - '.swiftformat'
      - '.swiftlint.yml'
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Makefile'
      - '.swiftformat'
      - '.swiftlint.yml'
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering the workflow run'
        required: false
        default: "Manual trigger"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write
  statuses: write

env:
  SWIFT_VERSION: "6.2.1"
  XCODE_VERSION: "16.4"

jobs:
  build-and-lint:
    runs-on: macos-15
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Fetch Commander dependency
      shell: bash
      run: git clone --depth 1 https://github.com/steipete/Commander.git ../Commander
    
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}
    
    - name: Install Swift toolchain
      uses: SwiftyLab/setup-swift@v1
      with:
        swift-version: ${{ env.SWIFT_VERSION }}
    
    - name: Install SwiftLint and SwiftFormat
      run: |
        brew install swiftlint swiftformat
    
    - name: Build
      run: |
        swift build
    
    - name: Run SwiftFormat (check only)
      continue-on-error: true
      run: |
        echo "::group::SwiftFormat Check"
        if ! swiftformat --lint .; then
          echo "::warning::SwiftFormat found formatting issues"
        fi
        echo "::endgroup::"
    
    - name: Run SwiftLint
      continue-on-error: true
      run: |
        echo "::group::SwiftLint Check"
        if ! swiftlint lint; then
          echo "::warning::SwiftLint found linting issues"
        fi
        echo "::endgroup::"
    
    - name: Run Tests (would require accessibility permissions)
      run: |
        echo "⚠️  Tests require accessibility permissions and cannot run on CI"
        echo "📝 Run 'make test' locally after granting accessibility permissions"

  accessibility-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macos-ephemeral]
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Fetch Commander dependency
      shell: bash
      run: git clone --depth 1 https://github.com/steipete/Commander.git ../Commander

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}

    - name: Install Swift toolchain
      uses: SwiftyLab/setup-swift@v1
      with:
        swift-version: ${{ env.SWIFT_VERSION }}

    - name: Build osx CLI
      shell: bash
      run: |
        set -euxo pipefail
        swift build --product osx
        echo "OSX_BIN=$(swift build --show-bin-path)/osx" >> "$GITHUB_ENV"

    - name: Grant accessibility to built CLI
      shell: bash
      run: |
        set -euxo pipefail
        gha-tcc apply --path "$OSX_BIN" accessibility
        gha-tcc status --path "$OSX_BIN" accessibility

    - name: Probe accessibility with osx CLI
      shell: bash
      run: |
        set -euxo pipefail
        "$OSX_BIN" query --app focused --max-depth 1 --limit 5 --no-color AXApplication | tee /tmp/osx-smoke-output.txt
        grep -q "AXApplication" /tmp/osx-smoke-output.txt

    - name: Run single end-to-end smoke test
      shell: bash
      run: |
        set -euxo pipefail
        swift test --filter getAllApplications

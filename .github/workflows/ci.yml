name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Makefile'
      - '.swiftformat'
      - '.swiftlint.yml'
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Makefile'
      - '.swiftformat'
      - '.swiftlint.yml'
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering the workflow run'
        required: false
        default: "Manual trigger"
      test_filter:
        description: 'Swift test filter to run on the Tart runner'
        required: false
        default: "getAllApplications"
      enable_coverage:
        description: 'Run tests with Swift code coverage enabled and print an llvm-cov report'
        required: false
        default: "false"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write
  statuses: write

jobs:
  build-and-lint:
    runs-on: [self-hosted, macos-ephemeral]
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Fetch Commander dependency
      shell: bash
      run: git clone --depth 1 https://github.com/steipete/Commander.git ../Commander
    
    - name: Show runner toolchain
      shell: bash
      run: |
        set -euxo pipefail
        xcodebuild -version
        swift --version
    
    - name: Install SwiftLint and SwiftFormat
      run: |
        brew install swiftlint swiftformat
    
    - name: Build
      shell: bash
      run: |
        set -euxo pipefail
        swift build --product osx --product AXFixtureApp
        echo "OSX_BIN=$(find .build -path '*/debug/*' -name osx | head -n 1)" >> "$GITHUB_ENV"
        echo "FIXTURE_BIN=$(find .build -path '*/debug/*' -name AXFixtureApp | head -n 1)" >> "$GITHUB_ENV"
    
    - name: Run SwiftFormat (check only)
      continue-on-error: true
      run: |
        echo "::group::SwiftFormat Check"
        if ! swiftformat --lint .; then
          echo "::warning::SwiftFormat found formatting issues"
        fi
        echo "::endgroup::"
    
    - name: Run SwiftLint
      continue-on-error: true
      run: |
        echo "::group::SwiftLint Check"
        if ! swiftlint lint; then
          echo "::warning::SwiftLint found linting issues"
        fi
        echo "::endgroup::"
    
    - name: Grant accessibility to built CLI
      shell: bash
      run: |
        set -euxo pipefail
        gha-tcc apply --path "$OSX_BIN" accessibility
        gha-tcc status --path "$OSX_BIN" accessibility

    - name: Probe accessibility with osx CLI
      shell: bash
      run: |
        set -euxo pipefail
        TMP_DIR="$(mktemp -d)"
        export AX_FIXTURE_READY_FILE="$TMP_DIR/ready"
        export AX_FIXTURE_STATE_FILE="$TMP_DIR/state.json"

        "$FIXTURE_BIN" &
        FIXTURE_PID=$!
        trap 'kill "$FIXTURE_PID" || true' EXIT

        for _ in $(seq 1 50); do
          if [ -f "$AX_FIXTURE_READY_FILE" ]; then
            break
          fi
          sleep 0.1
        done

        [ -f "$AX_FIXTURE_READY_FILE" ]
        "$OSX_BIN" query --app "$FIXTURE_PID" --limit 5 --no-color AXWindow | tee /tmp/osx-smoke-output.txt
        grep -q "AXFixtureApp Main Window" /tmp/osx-smoke-output.txt

    - name: Run Tests
      shell: bash
      env:
        RUN_AUTOMATION_TESTS: "true"
      run: |
        set -euxo pipefail
        TEST_FILTER="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_filter || '' }}"
        ENABLE_COVERAGE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_coverage || 'false' }}"

        TEST_ARGS=()
        if [ "$ENABLE_COVERAGE" = "true" ]; then
          TEST_ARGS+=(--enable-code-coverage)
        fi
        if [ -n "$TEST_FILTER" ]; then
          TEST_ARGS+=(--filter "$TEST_FILTER")
        fi

        swift test "${TEST_ARGS[@]}"

        if [ "$ENABLE_COVERAGE" = "true" ]; then
          TEST_BINARY="$(find .build -path '*OSXQueryPackageTests.xctest/Contents/MacOS/OSXQueryPackageTests' | head -n 1)"
          xcrun llvm-cov report "$TEST_BINARY" \
            -instr-profile .build/arm64-apple-macosx/debug/codecov/default.profdata \
            Sources/OSXQuery Sources/osx
        fi
